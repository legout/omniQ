[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "omniq"
version = "0.1.0"
description = "A flexible task queue library for Python"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "Your Name", email = "your.email@example.com"},
]
dependencies = [
    "msgspec>=0.18.0",
    "dill>=0.3.6",
    "fsspec>=2023.9.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
s3 = ["s3fs>=2023.9.0"]
gcs = ["gcsfs>=2023.9.0"]
azure = ["adlfs>=2023.9.0"]
postgres = ["asyncpg>=0.27.0"]
redis = ["redis>=4.5.5"]
nats = ["nats-py>=2.3.1"]
gevent = ["gevent>=23.9.0"]
dashboard = ["litestar>=2.0.0", "htpy>=0.1.0", "datastar-py>=0.1.0"]
all = [
    "s3fs>=2023.9.0",
    "gcsfs>=2023.9.0",
    "adlfs>=2023.9.0",
    "asyncpg>=0.27.0",
    "redis>=4.5.5",
    "nats-py>=2.3.1",
    "gevent>=23.9.0",
    "litestar>=2.0.0",
    "htpy>=0.1.0",
    "datastar-py>=0.1.0",
]
dev = [
    "pytest>=7.3.1",
    "pytest-asyncio>=0.21.0",
    "ruff>=0.0.262",
    "mypy>=1.2.0",
]

[tool.ruff]
line-length = 100
target-version = "py38"

[tool.mypy]
python_version = "3.8"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true